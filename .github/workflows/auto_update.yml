name: Visa Data Auto-Updater
on:
  schedule:
    - cron: '0 0 * * 1' # Har Monday raat 12 baje
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Action ko file likhne ki ijazat dene ke liye
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4
        
      - name: Run Scraper
        run: python main.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/master_visa_data.csv
          git commit -m "Automated Visa Data Update"
          git push origin main